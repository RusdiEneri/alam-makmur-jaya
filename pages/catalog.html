<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Katalog Produk — UD. Alam Makmur Jaya</title>
  <link rel="icon" href="/assets/store.ico" type="image/x-icon"/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,700;1,9..144,400&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/style.css"/>
  <style>
    .catalog-layout { display: grid; grid-template-columns: 220px 1fr; gap: 2rem; }
    .sidebar { background: white; border-radius: 12px; padding: 1.25rem; border: 1.5px solid #E5E5E5; height: fit-content; position: sticky; top: 80px; }
    .sidebar h3 { font-size: 14px; font-weight: 700; color: #1C1C1E; margin-bottom: 1rem; }
    .filter-group { margin-bottom: 1.5rem; }
    .filter-label { font-size: 12px; font-weight: 600; color: #6B6B6B; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    .filter-item { display: flex; align-items: center; gap: 8px; padding: 7px 0; cursor: pointer; }
    .filter-item input[type="radio"] { accent-color: #E85D26; }
    .filter-item label { font-size: 14px; cursor: pointer; color: #2D2D2D; }
    .catalog-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; }
    .catalog-header h2 { font-family: 'Fraunces', serif; font-size: 1.4rem; }
    .search-bar { display: flex; gap: 8px; margin-bottom: 1.5rem; }
    .search-bar input { flex: 1; padding: 10px 14px; border: 1.5px solid #E5E5E5; border-radius: 8px; font-family: inherit; font-size: 14px; }
    .search-bar input:focus { outline: none; border-color: #E85D26; }
    .product-count { font-size: 13px; color: #6B6B6B; }
    @media (max-width: 768px) {
      .catalog-layout { grid-template-columns: 1fr; }
      .sidebar { position: static; }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="../index.html" class="brand">
      <span class="brand-icon">🏗</span>
      <div>
        <span class="brand-name">Alam Makmur Jaya</span>
        <span class="brand-sub">Toko Bahan Bangunan</span>
      </div>
    </a>
    <div class="nav-links">
      <a href="../index.html">Beranda</a>
      <a href="catalog.html" class="active">Katalog</a>
      <a href="cart.html">🛒 Keranjang <span id="cart-count" class="badge">0</span></a>
      <a href="login.html" class="btn-login">Masuk</a>
    </div>
    <button class="hamburger" onclick="toggleMenu()">☰</button>
  </nav>

  <div class="page-hero">
    <h1>Katalog Produk</h1>
    <p>Temukan semua kebutuhan material bangunan Anda</p>
  </div>

  <div class="page-body">
    <div class="search-bar">
      <input type="text" id="search-input" placeholder="🔍  Cari produk... (cth: semen, pipa, kabel)" oninput="filterProducts()"/>
    </div>

    <div class="catalog-layout">
      <!-- SIDEBAR -->
      <aside class="sidebar">
        <h3>Filter</h3>
        <div class="filter-group">
          <p class="filter-label">Kategori</p>
          <!-- Nilai value harus SAMA PERSIS dengan field "kategori" di products.json -->
          <div class="filter-item"><input type="radio" name="cat" id="all" value="" checked onchange="filterProducts()"><label for="all">Semua</label></div>
          <div class="filter-item"><input type="radio" name="cat" id="bahan" value="Bahan Bangunan" onchange="filterProducts()"><label for="bahan">🧱 Bahan Bangunan</label></div>
          <div class="filter-item"><input type="radio" name="cat" id="pipa" value="Pipa & Selang" onchange="filterProducts()"><label for="pipa">🔧 Pipa & Selang</label></div>
          <div class="filter-item"><input type="radio" name="cat" id="listrik" value="Listrik" onchange="filterProducts()"><label for="listrik">⚡ Listrik</label></div>
          <div class="filter-item"><input type="radio" name="cat" id="kayu" value="Kayu" onchange="filterProducts()"><label for="kayu">🪵 Kayu</label></div>
          <div class="filter-item"><input type="radio" name="cat" id="material" value="Material" onchange="filterProducts()"><label for="material">🪨 Material</label></div>
          <div class="filter-item"><input type="radio" name="cat" id="sanitasi" value="Sanitasi" onchange="filterProducts()"><label for="sanitasi">🚿 Sanitasi</label></div>
          <div class="filter-item"><input type="radio" name="cat" id="paku" value="Paku & Baut" onchange="filterProducts()"><label for="paku">🔩 Paku & Baut</label></div>
        </div>
        <div class="filter-group">
          <p class="filter-label">Ketersediaan</p>
          <div class="filter-item"><input type="radio" name="stok" id="stok-all" value="" checked onchange="filterProducts()"><label for="stok-all">Semua</label></div>
          <div class="filter-item"><input type="radio" name="stok" id="stok-ada" value="ada" onchange="filterProducts()"><label for="stok-ada">✓ Tersedia</label></div>
          <div class="filter-item"><input type="radio" name="stok" id="stok-habis" value="habis" onchange="filterProducts()"><label for="stok-habis">✗ Habis</label></div>
        </div>
      </aside>

      <!-- PRODUCT LIST -->
      <div>
        <div class="catalog-header">
          <h2>Produk</h2>
          <span class="product-count" id="product-count"></span>
        </div>
        <div class="product-grid" id="catalog-grid" style="grid-template-columns: repeat(3,1fr)"></div>
      </div>
    </div>
  </div>

  <footer class="footer">
    <div class="footer-inner">
      <div>
        <p class="footer-brand">🏗 UD. Alam Makmur Jaya</p>
        <p class="footer-addr">Gresik, Jawa Timur 61124</p>
      </div>
      <div class="footer-links">
        <a href="catalog.html">Katalog</a>
        <a href="login.html">Login Admin</a>
      </div>
    </div>
    <p class="footer-copy">© 2025 UD. Alam Makmur Jaya · Kelompok 8 UISI</p>
  </footer>


  <script src="../js/api.js"></script>
  <script src="../js/data.js"></script>
  <script>

    const EMOJI_MAP = {
      'Bahan Bangunan': '🧱', 'Pipa & Selang': '🔧', 'Listrik': '⚡',
      'Kayu': '🪵', 'Material': '🪨', 'Sanitasi': '🚿',
      'Paku & Baut': '🔩', 'Umum': '📦'
    };

    // FIX: simpan produk secara global agar handleAdd bisa lookup tanpa fetch ulang
    let catalogProducts = [];

    async function filterProducts() {
      const search     = document.getElementById('search-input').value.toLowerCase();
      const cat        = document.querySelector('input[name="cat"]:checked').value;
      const stokFilter = document.querySelector('input[name="stok"]:checked').value;

      try {
        catalogProducts = await API.getProducts();
      } catch (err) {
        document.getElementById('catalog-grid').innerHTML =
          '<div style="grid-column:1/-1;text-align:center;padding:3rem;color:#E85D26">' +
          '<p style="font-size:2rem">⚠️</p><p>Gagal memuat produk. Pastikan server backend berjalan.</p></div>';
        return;
      }

      let products = [...catalogProducts];

      if (cat)                   products = products.filter(p => p.kategori === cat);
      if (stokFilter === 'ada')   products = products.filter(p => p.stok > 0);
      if (stokFilter === 'habis') products = products.filter(p => p.stok <= 0);
      if (search) {
        products = products.filter(p =>
          p.nama.toLowerCase().includes(search) ||
          (p.kategori && p.kategori.toLowerCase().includes(search))
        );
      }

      document.getElementById('product-count').textContent = `${products.length} produk ditemukan`;

      const grid = document.getElementById('catalog-grid');
      if (products.length === 0) {
        grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:3rem;color:#6B6B6B">' +
          '<p style="font-size:3rem">🔍</p><p style="font-weight:600">Produk tidak ditemukan</p></div>';
        return;
      }

      grid.innerHTML = products.map(p => {
        const sl    = stockLabel(p.stok);
        const emoji = EMOJI_MAP[p.kategori] || '📦';
        return `
          <div class="product-card">
            <div class="product-img">${emoji}</div>
            <div class="product-body">
              <p class="product-cat">${p.kategori}</p>
              <p class="product-name">${p.nama}</p>
              <p class="product-price">
                ${formatRupiah(p.harga)}
                <span style="font-size:11px;font-weight:400;color:#6B6B6B"> /${p.satuan}</span>
              </p>
              <p class="product-stock ${sl.cls}">${sl.text}</p>
              <button
                class="btn-add"
                onclick="handleAdd('${p.id}')"
                ${p.stok < 1 ? 'disabled style="opacity:0.5;cursor:not-allowed"' : ''}>
                + Keranjang
              </button>
            </div>
          </div>`;
      }).join('');
    }

    // FIX: simpan data produk lengkap ke cart (bukan hanya { id, qty })
    function handleAdd(id) {
      const product = catalogProducts.find(p => p.id === id);
      if (!product) { showToast('✗ Produk tidak ditemukan'); return; }
      const success = addToCart(id, 1, product);
      if (success) showToast('✓ Ditambahkan ke keranjang!');
      else showToast('✗ Stok habis.');
    }

    const urlCat = new URLSearchParams(window.location.search).get('cat');
    if (urlCat) {
      document.querySelectorAll('input[name="cat"]').forEach(r => {
        if (r.value.toLowerCase() === urlCat.toLowerCase()) r.checked = true;
      });
    }

    filterProducts();

  </script>
</body>
</html>
