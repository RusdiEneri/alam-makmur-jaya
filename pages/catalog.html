<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Katalog Produk — UD. Alam Makmur Jaya</title>
  <link rel="icon" href="/assets/store.ico" type="image/x-icon"/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,700;1,9..144,400&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/style.css"/>
  <style>
    .catalog-layout { display: grid; grid-template-columns: 220px 1fr; gap: 2rem; }
    .sidebar { background: white; border-radius: 12px; padding: 1.25rem; border: 1.5px solid #E5E5E5; height: fit-content; position: sticky; top: 80px; }
    .sidebar h3 { font-size: 14px; font-weight: 700; color: #1C1C1E; margin-bottom: 1rem; }
    .filter-group { margin-bottom: 1.5rem; }
    .filter-label { font-size: 12px; font-weight: 600; color: #6B6B6B; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    .filter-item { display: flex; align-items: center; gap: 8px; padding: 7px 0; cursor: pointer; }
    .filter-item input[type="radio"] { accent-color: #E85D26; }
    .filter-item label { font-size: 14px; cursor: pointer; color: #2D2D2D; }
    .catalog-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; }
    .catalog-header h2 { font-family: 'Fraunces', serif; font-size: 1.4rem; }
    .search-bar { display: flex; gap: 8px; margin-bottom: 1.5rem; }
    .search-bar input { flex: 1; padding: 10px 14px; border: 1.5px solid #E5E5E5; border-radius: 8px; font-family: inherit; font-size: 14px; }
    .search-bar input:focus { outline: none; border-color: #E85D26; }
    .product-count { font-size: 13px; color: #6B6B6B; }
    @media (max-width: 768px) {
      .catalog-layout { grid-template-columns: 1fr; }
      .sidebar { position: static; }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="../index.html" class="brand">
      <span class="brand-icon">🏗</span>
      <div>
        <span class="brand-name">Alam Makmur Jaya</span>
        <span class="brand-sub">Toko Bahan Bangunan</span>
      </div>
    </a>
    <div class="nav-links">
      <a href="../index.html">Beranda</a>
      <a href="catalog.html" class="active">Katalog</a>
      <a href="cart.html">🛒 Keranjang <span id="cart-count" class="badge">0</span></a>
      <a href="login.html" class="btn-login">Masuk</a>
    </div>
  </nav>

  <div class="page-hero">
    <h1>Katalog Produk</h1>
    <p>Temukan semua kebutuhan material bangunan Anda</p>
  </div>

  <div class="page-body">
    <div class="search-bar">
      <input type="text" id="search-input" placeholder="🔍  Cari produk... (cth: semen, pipa, kabel)" oninput="filterProducts()"/>
    </div>

    <div class="catalog-layout">
      <!-- SIDEBAR -->
      <aside class="sidebar">
        <h3>Filter</h3>
        <div class="filter-group">
          <p class="filter-label">Kategori</p>
          <div class="filter-item"><input type="radio" name="cat" id="all" value="" checked onchange="filterProducts()"><label for="all">Semua</label></div>
          <div class="filter-item"><input type="radio" name="cat" id="semen" value="semen" onchange="filterProducts()"><label for="semen">🧱 Semen</label></div>
          <div class="filter-item"><input type="radio" name="cat" id="pipa" value="pipa" onchange="filterProducts()"><label for="pipa">🔧 Pipa & Fitting</label></div>
          <div class="filter-item"><input type="radio" name="cat" id="kabel" value="kabel" onchange="filterProducts()"><label for="kabel">⚡ Kabel Listrik</label></div>
          <div class="filter-item"><input type="radio" name="cat" id="cat" value="cat" onchange="filterProducts()"><label for="cat">🎨 Cat</label></div>
          <div class="filter-item"><input type="radio" name="cat" id="paku" value="paku" onchange="filterProducts()"><label for="paku">🔩 Paku & Baut</label></div>
          <div class="filter-item"><input type="radio" name="cat" id="kayu" value="kayu" onchange="filterProducts()"><label for="kayu">🪵 Kayu</label></div>
          <div class="filter-item"><input type="radio" name="cat" id="lampu" value="lampu" onchange="filterProducts()"><label for="lampu">💡 Lampu</label></div>
        </div>
        <div class="filter-group">
          <p class="filter-label">Ketersediaan</p>
          <div class="filter-item"><input type="radio" name="stok" id="stok-all" value="" checked onchange="filterProducts()"><label for="stok-all">Semua</label></div>
          <div class="filter-item"><input type="radio" name="stok" id="stok-ada" value="ada" onchange="filterProducts()"><label for="stok-ada">✓ Tersedia</label></div>
          <div class="filter-item"><input type="radio" name="stok" id="stok-habis" value="habis" onchange="filterProducts()"><label for="stok-habis">✗ Habis</label></div>
        </div>
      </aside>

      <!-- PRODUCT LIST -->
      <div>
        <div class="catalog-header">
          <h2>Produk</h2>
          <span class="product-count" id="product-count"></span>
        </div>
        <div class="product-grid" id="catalog-grid" style="grid-template-columns: repeat(3,1fr)"></div>
      </div>
    </div>
  </div>

  <footer class="footer">
    <div class="footer-inner">
      <div>
        <p class="footer-brand">🏗 UD. Alam Makmur Jaya</p>
        <p class="footer-addr">Gresik, Jawa Timur 61124</p>
      </div>
      <div class="footer-links">
        <a href="catalog.html">Katalog</a>
        <a href="login.html">Login Admin</a>
      </div>
    </div>
    <p class="footer-copy">© 2025 UD. Alam Makmur Jaya · Kelompok 8 UISI</p>
  </footer>

  <script src="../js/data.js"></script>
  <script>
    function filterProducts() {
      const search = document.getElementById('search-input').value.toLowerCase();
      const cat = document.querySelector('input[name="cat"]:checked').value;
      const stokFilter = document.querySelector('input[name="stok"]:checked').value;

      let products = getProducts();
      if (cat) products = products.filter(p => p.category === cat);
      if (stokFilter === 'ada') products = products.filter(p => p.stock > 0);
      if (stokFilter === 'habis') products = products.filter(p => p.stock === 0);
      if (search) products = products.filter(p => p.name.toLowerCase().includes(search) || p.category.includes(search));

      document.getElementById('product-count').textContent = `${products.length} produk ditemukan`;

      const grid = document.getElementById('catalog-grid');
      if (products.length === 0) {
        grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:3rem;color:#6B6B6B"><p style="font-size:3rem">🔍</p><p style="font-weight:600">Produk tidak ditemukan</p></div>';
        return;
      }

      grid.innerHTML = products.map(p => {
        const sl = stockLabel(p.stock);
        return `
          <div class="product-card">
            <div class="product-img">${p.emoji}</div>
            <div class="product-body">
              <p class="product-cat">${p.category}</p>
              <p class="product-name">${p.name}</p>
              <p class="product-price">${formatRupiah(p.price)}<span style="font-size:11px;font-weight:400;color:#6B6B6B"> /${p.unit}</span></p>
              <p class="product-stock ${sl.cls}">${sl.text}</p>
              <button class="btn-add" onclick="handleAdd(${p.id})" ${p.stock < 1 ? 'disabled style="opacity:0.5;cursor:not-allowed"' : ''}>
                + Keranjang
              </button>
            </div>
          </div>`;
      }).join('');
    }

    function handleAdd(id) {
      if (addToCart(id)) showToast('✓ Ditambahkan ke keranjang!');
      else showToast('✗ Stok habis!');
    }

    // Handle URL param ?cat=
    const urlCat = new URLSearchParams(window.location.search).get('cat');
    if (urlCat) {
      const radio = document.getElementById(urlCat);
      if (radio) radio.checked = true;
    }

    filterProducts();
  </script>
</body>
</html>
